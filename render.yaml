# One-click hosted demo on Render (free tier).
#   Render dashboard -> New -> Blueprint -> pick the repo -> Apply -> open the URL.
#   Click "Seed sample KYC gallery", then run the planted fraud probe.
#
# Uses the in-memory vector store + demo embeddings: zero external setup and
# INSTANT consistency, so seed -> screen works immediately. (Managed indexes
# like Pinecone are eventually consistent, so a just-seeded demo can briefly
# read as CLEAR — not ideal for a live judge demo.)
#
# To use Pinecone for a PERSISTENT gallery instead: in the Render dashboard set
#   VECTOR_BACKEND = pinecone
#   PINECONE_API_KEY = <your key>
# and allow a few seconds after seeding before screening. The vector layer is
# pluggable (Pinecone / Redis / memory) — see app/services/vector_store.py.
services:
  - type: web
    name: facesentinel-demo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-demo.txt
    startCommand: bash scripts/start_demo.sh
    envVars:
      - key: VECTOR_BACKEND
        value: memory
      - key: EMBEDDING_MODE
        value: demo
      - key: API_KEY
        generateValue: true          # one key shared by API + console (no 401)
      - key: ARROW_DEFAULT_MEMORY_POOL
        value: system                # avoid the pyarrow/mimalloc segfault
      - key: PYTHON_VERSION
        value: 3.11.9
